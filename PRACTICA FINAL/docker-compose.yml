services:
  # =============================
  # RABBITMQ
  # =============================
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: always
    ports:
      - "5672:5672"   # Puerto de comunicación AMQP
      - "15672:15672" # Puerto del panel de control (User/Pass: guest)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =============================
  # AUTH DATABASE
  # =============================
  mysql-auth:
    image: mysql:8.0
    container_name: mysql-auth
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 201504070
      MYSQL_DATABASE: auth_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_auth_data:/var/lib/mysql
      - ./backend/sql/init-auth.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  # =============================
  # USERS DATABASE
  # =============================
  mysql-users:
    image: mysql:8.0
    container_name: mysql-users
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 201504070
      MYSQL_DATABASE: users_db
    ports:
      - "3308:3306"
    volumes:
      - mysql_users_data:/var/lib/mysql
      - ./backend/sql/init-users.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  # =============================
  # TICKETS DATABASE
  # =============================
  mysql-tickets:
    image: mysql:8.0
    container_name: mysql-tickets
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 201504070
      MYSQL_DATABASE: tickets_db
    ports:
      - "3309:3306"
    volumes:
      - mysql_tickets_data:/var/lib/mysql
      - ./backend/sql/init-tickets.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  # =============================
  # ASSIGNMENTS DATABASE
  # =============================
  mysql-assignments:
    image: mysql:8.0
    container_name: mysql-assignments
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 201504070
      MYSQL_DATABASE: assignments_db
    ports:
      - "3310:3306"
    volumes:
      - mysql_assignments_data:/var/lib/mysql
      - ./backend/sql/init-assignments.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  # =============================
  # AUTH SERVICE
  # =============================
  auth-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.auth-service
    container_name: auth-service
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: mysql-auth
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    depends_on:
      mysql-auth:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "50051:50051"

  # =============================
  # USERS SERVICE
  # =============================
  users-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.users-service
    container_name: users-service
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: mysql-users
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    depends_on:
      mysql-users:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "50052:50052"

  # =============================
  # TICKETS SERVICE (PRODUCTOR)
  # =============================
  tickets-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.tickets-service
    container_name: tickets-service
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: mysql-tickets
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    depends_on:
      mysql-tickets:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "50053:50053"

  # =============================
  # ASSIGNMENTS SERVICE (CONSUMIDOR)
  # =============================
  assignments-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.assignments-service
    container_name: assignments-service
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: mysql-assignments
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      RABBITMQ_QUEUE: ticket_assignments
      RABBITMQ_EXCHANGE: tickets_exchange
      TICKETS_SERVICE_URL: tickets-service:50053
    depends_on:
      mysql-assignments:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      tickets-service:
        condition: service_started
    ports:
      - "50054:50054"

  # =============================
  # API GATEWAY
  # =============================
  api-gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile.api-gateway
    container_name: api-gateway
    env_file:
      - ./backend/.env
    environment:
      AUTH_SERVICE_URL: auth-service:50051
      USERS_SERVICE_URL: users-service:50052
      TICKETS_SERVICE_URL: tickets-service:50053
      ASSIGNMENTS_SERVICE_URL: assignments-service:50054
      NOTIFICATION_SERVICE_URL: notifications-service:50055
    depends_on:
      - auth-service
      - users-service
      - tickets-service
      - assignments-service
    ports:
      - "4000:4000"

  # =============================
  # FRONTEND
  # =============================
  frontend:
    build:
      context: ./frontend
    container_name: frontend
    ports:
      - "5173:80"
    depends_on:
      - api-gateway

volumes:
  mysql_auth_data:
  mysql_users_data:
  mysql_tickets_data:
  mysql_assignments_data:
  rabbitmq_data: