syntax = "proto3";

package notifications;

service NotificationsService {
  rpc FindNotifications (FindNotificationsRequest) returns (FindNotificationsResponse);
  rpc FindByRecipient   (FindByRecipientRequest)   returns (FindNotificationsResponse);
}

message FindNotificationsRequest {
  string recipient_id = 1;
  string ticket_id    = 2;
  bool   sent         = 3;
  int32  page         = 4;
  int32  limit        = 5;
}

message FindByRecipientRequest {
  string recipient_id = 1;
  int32  page         = 2;
  int32  limit        = 3;
}

message NotificationResponse {
  string id                   = 1;
  string recipient_id         = 2;
  string ticket_id            = 3;
  string notification_type    = 4;
  string channel              = 5;
  string subject              = 6;
  string body                 = 7;
  bool   sent                 = 8;
  string sent_at              = 9;
  string error_message        = 10;
  string created_at           = 11;
}

message FindNotificationsResponse {
  repeated NotificationResponse notifications = 1;
  int32                         total         = 2;
  int32                         page          = 3;
  int32                         limit         = 4;
}
